name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # better-sqlite3 and sharp ship native bindings; install build deps so
      # npm ci can rebuild them when a prebuilt binary isn't available.
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 make g++ libvips

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm -w @sophie/shared run build

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: sophie-keep:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
